apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yel-hadr/yel-hadr
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true              # removes resources deleted from repo
      selfHeal: true           # reverts manual kubectl changes
    syncOptions:
      - CreateNamespace=true
